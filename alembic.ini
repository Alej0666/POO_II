# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to the constructor of datetime.datetime(), see the value
# accepted for its timezone argument here.
# Leave the datetime.timezone.utc for UTC
sqlalchemy.timezone = 

# max length of characters to apply to the
# "slug" field if truncating of the slug is needed
# truncate_slug_len = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Logging can be off with a value of logging_level = NOTSET
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# The sqlalchemy.url is also configurable from the environment, using the
# 'sqlalchemy.url' variable.  A representative value:
sqlalchemy.url = sqlite:///./taskflow.db

# Connection pooling configuration - in case a driverless SQLite database
# is being used, the URL and echo settings are passed through to create the
# database engine. Note that when using the sqlalchemy.url setting, the echo
# argument must be defined here too as an option.
# For remote databases, the sqlalchemy.echo setting should be set in either
# this file or can be passed on the command line with the -x option to the
# alembic command or the SQLALCHEMY_ECHO environment variable.
# If at least one entry is defined in this section, then the sqlalchemy.url
# entry is used to configure the database connection. Otherwise, it falls back
# to the legacy method of individual option specification.

[sqlalchemy]
# the output encoding used when revision files
# are written from script.py.mako
# and when fsearch is used to find source
# this can be adjusted if non-ascii characters
# might result in generation errors in using --autogenerate
output_encoding = utf-8
