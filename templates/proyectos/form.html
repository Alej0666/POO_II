<div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
        <i class="bi bi-folder-plus me-2"></i>Nuevo Proyecto
    </div>
    <div class="card-body">
        <div id="error-proyecto" class="alert alert-danger d-none mb-2 py-2 small"></div>
        <form hx-ext="json-enc"
              hx-post="/proyectos"
              hx-target="#lista-proyectos"
              hx-swap="innerHTML"
              hx-on::after-request="
                if(event.detail.successful) { this.reset(); document.getElementById('error-proyecto').classList.add('d-none'); }
                else { var el = document.getElementById('error-proyecto'); el.classList.remove('d-none'); try { el.textContent = JSON.parse(event.detail.xhr.responseText).detail; } catch(e) { el.textContent = 'Error al crear el proyecto.'; } }
              ">
            <div class="row g-2">
                <div class="col-md-4">
                    <input class="form-control" type="text"
                           name="nombre" placeholder="Nombre (mín. 3 car.)" required minlength="3" maxlength="50">
                </div>
                <div class="col-md-3">
                    <input class="form-control" type="text"
                           name="descripcion" placeholder="Descripción (opcional)">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="lider_id" id="select-lider" required>
                        <option value="" disabled selected>— Seleccionar líder —</option>
                        {% for item in usuarios %}
                        <option value="{{ item.usuario.id }}">{{ item.usuario.username }} ({{ item.usuario.email }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" type="submit">
                        <i class="bi bi-plus-lg me-1"></i>Crear
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
    </div>
</div>
